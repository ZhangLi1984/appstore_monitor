<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AppStore 状态监控大盘</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: #f3f4f6;
            color: #1f2937;
            margin: 0;
            padding: 20px;
        }
        .container {
            max-width: 1000px;
            margin: 0 auto;
        }
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }
        button {
            background-color: #3b82f6;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 6px;
            cursor: pointer;
            font-weight: 600;
            transition: background-color 0.2s;
        }
        button:hover { background-color: #2563eb; }
        .stats-container {
            display: flex;
            gap: 20px;
            margin-bottom: 20px;
        }
        .stat-card {
            background: white;
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
            flex: 1;
        }
        .stat-card h3 { margin: 0 0 15px 0; color: #4b5563; border-bottom: 1px solid #e5e7eb; padding-bottom: 10px; }
        .stat-row { display: flex; justify-content: space-between; margin-bottom: 8px; font-weight: 500; }
        table {
            width: 100%;
            background: white;
            border-collapse: collapse;
            border-radius: 10px;
            overflow: hidden;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
        }
        th, td {
            padding: 15px;
            text-align: left;
            border-bottom: 1px solid #e5e7eb;
        }
        th { background-color: #f9fafb; font-weight: 600; color: #4b5563; }
        tr:last-child td { border-bottom: none; }
        tr:hover { background-color: #f9fafb; }
        .status-online { color: #10b981; font-weight: bold; }
        .status-offline { color: #ef4444; font-weight: bold; }
        .status-error { color: #f59e0b; font-weight: bold; }
        .tag {
            background-color: #e5e7eb;
            padding: 4px 8px;
            border-radius: 4px;
            font-size: 12px;
            font-weight: 600;
        }
        .loading { text-align: center; padding: 40px; color: #6b7280; font-size: 16px; }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h2>📱 AppStore 状态监控大盘</h2>
            <button onclick="startCheck()">刷新状态</button>
        </div>
        
        <div class="stats-container" id="stats">
            </div>

        <table>
            <thead>
                <tr>
                    <th>状态</th>
                    <th>应用名称</th>
                    <th>App ID</th>
                    <th>地区</th>
                    <th>开发者</th>
                </tr>
            </thead>
            <tbody id="app-list">
                <tr><td colspan="5" class="loading">正在加载应用信息并检查状态...</td></tr>
            </tbody>
        </table>
    </div>

    <script>
        // 利用 JSONP 绕过 Apple iTunes API 的浏览器跨域限制
        function fetchItunesJSONP(id, country) {
            return new Promise((resolve, reject) => {
                const callbackName = 'itunes_cb_' + Math.round(1000000 * Math.random());
                window[callbackName] = function(data) {
                    delete window[callbackName];
                    document.body.removeChild(script);
                    resolve(data);
                };
                
                const script = document.createElement('script');
                // 调用 iTunes 查询接口
                script.src = `https://itunes.apple.com/lookup?id=${id}&country=${country}&callback=${callbackName}`;
                script.onerror = () => {
                    delete window[callbackName];
                    document.body.removeChild(script);
                    reject(new Error('Network or CORS Error'));
                };
                document.body.appendChild(script);
            });
        }

        async function startCheck() {
            const tbody = document.getElementById('app-list');
            const statsDiv = document.getElementById('stats');
            tbody.innerHTML = '<tr><td colspan="5" class="loading">🚀 正在获取最新状态...</td></tr>';
            
            let apps = [];
            try {
                // 读取同目录下的 app_info.json 文件
                const res = await fetch('app_info.json');
                apps = await res.json();
            } catch (e) {
                tbody.innerHTML = `<tr><td colspan="5" class="status-error" style="text-align:center;">读取 app_info.json 失败。<br>请确保你正在使用本地服务器 (如 Live Server) 打开网页，直接双击 HTML 文件会因浏览器的同源策略被拦截。</td></tr>`;
                return;
            }

            const stats = {
                cn: { online: 0, offline: 0, error: 0 },
                us: { online: 0, offline: 0, error: 0 }
            };

            // 创建并发请求任务以提高检查速度
            const checkPromises = [];

            apps.forEach(app => {
                const countries = app.countries || ['cn'];
                countries.forEach(country => {
                    const promise = fetchItunesJSONP(app.id, country).then(data => {
                        let status = 'error';
                        let name = app.name;
                        let developer = '-';
                        
                        // 还原 Python 脚本中的判断逻辑：如果有 resultCount 即为在线
                        if (data && data.resultCount > 0) {
                            status = 'online';
                            name = data.results[0].trackName;
                            developer = data.results[0].sellerName || '未知开发者';
                        } else if (data && data.resultCount === 0) {
                            status = 'offline';
                        }

                        return { id: app.id, name, country, status, developer };
                    }).catch(err => {
                        return { id: app.id, name: app.name, country, status: 'error', developer: '-' };
                    });
                    checkPromises.push(promise);
                });
            });

            // 等待所有应用的检查结果
            const results = await Promise.all(checkPromises);
            
            // 清空表格准备渲染
            tbody.innerHTML = ''; 

            results.forEach(item => {
                // 汇总统计数据
                const region = item.country.toLowerCase();
                if (!stats[region]) stats[region] = { online: 0, offline: 0, error: 0 };
                stats[region][item.status]++;

                // 渲染表格行
                const tr = document.createElement('tr');
                
                let statusHtml = '';
                if (item.status === 'online') statusHtml = '<span class="status-online">✅ 在线</span>';
                else if (item.status === 'offline') statusHtml = '<span class="status-offline">🚫 下架</span>';
                else statusHtml = '<span class="status-error">❌ 异常</span>';

                const regionDisplay = region === 'cn' ? '🇨🇳 CN' : (region === 'us' ? '🇺🇸 US' : region.toUpperCase());

                tr.innerHTML = `
                    <td>${statusHtml}</td>
                    <td><strong>${item.name}</strong></td>
                    <td>${item.id}</td>
                    <td><span class="tag">${regionDisplay}</span></td>
                    <td>${item.developer}</td>
                `;
                tbody.appendChild(tr);
            });

            // 渲染顶部的统计看板
            statsDiv.innerHTML = '';
            Object.keys(stats).forEach(region => {
                const title = region === 'cn' ? '🇨🇳 中国区概况' : (region === 'us' ? '🇺🇸 美国区概况' : `${region.toUpperCase()}区概况`);
                const box = document.createElement('div');
                box.className = 'stat-card';
                box.innerHTML = `
                    <h3>${title}</h3>
                    <div class="stat-row"><span>✅ 在线：</span><span class="status-online">${stats[region].online}</span></div>
                    <div class="stat-row"><span>🚫 下架：</span><span class="status-offline">${stats[region].offline}</span></div>
                    ${stats[region].error > 0 ? `<div class="stat-row"><span>❌ 异常：</span><span class="status-error">${stats[region].error}</span></div>` : ''}
                `;
                statsDiv.appendChild(box);
            });
        }

        // 页面打开时自动执行检查
        window.onload = startCheck;
    </script>
</body>
</html>
